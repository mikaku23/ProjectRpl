<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Kelas</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #111827;
      --accent: #22c55e;
      --text: #e5e7eb;
      --sub: #9ca3af;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      padding: 15px;
    }

    .container {
      max-width: 1200px;
      margin: auto;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    h1 {
      font-size: 20px;
    }

    .search {
      padding: 10px 12px;
      border-radius: 8px;
      border: none;
      background: var(--card);
      color: white;
      width: 250px;
      max-width: 100%;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 15px;
    }

    .card {
      background: var(--card);
      padding: 15px;
      border-radius: 12px;
      transition: 0.3s;
      cursor: pointer;
      position: relative;
    }

    .card:hover {
      transform: translateY(-5px);
      border: 1px solid var(--accent);
    }

    .card h3 {
      margin-bottom: 8px;
      font-size: 16px;
    }

    .card p {
      color: var(--sub);
      font-size: 13px;
    }

    .badge {
      position: absolute;
      top: 10px;
      right: 10px;
      background: var(--accent);
      color: black;
      padding: 3px 8px;
      border-radius: 6px;
      font-size: 11px;
    }

    .modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.7);
      display: flex;
      justify-content: center;
      align-items: center;
      visibility: hidden;
      opacity: 0;
      transition: 0.3s;
      padding: 10px;
    }

    .modal.active {
      visibility: visible;
      opacity: 1;
    }

    .modal-content {
      background: var(--card);
      padding: 20px;
      border-radius: 12px;
      width: 100%;
      max-width: 400px;
    }

    .close {
      float: right;
      cursor: pointer;
      color: var(--sub);
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 10px;
      margin-bottom: 20px;
    }

    .stat-box {
      background: var(--card);
      padding: 12px;
      border-radius: 10px;
      text-align: center;
    }

    .stat-box h2 {
      color: var(--accent);
      font-size: 18px;
    }

    .stat-box p {
      font-size: 12px;
      color: var(--sub);
    }

    /* RESPONSIVE BREAKPOINTS */

    @media (max-width: 768px) {
      h1 {
        font-size: 18px;
      }

      .search {
        width: 100%;
      }

      .card {
        padding: 12px;
      }
    }

    @media (max-width: 480px) {
      body {
        padding: 10px;
      }

      .card h3 {
        font-size: 14px;
      }

      .card p {
        font-size: 12px;
      }

      .stat-box h2 {
        font-size: 16px;
      }
    }

  </style>
</head>
<body>

<div class="container">
  <header>
    <h1>Dashboard Kelas</h1>
    <input type="text" id="search" class="search" placeholder="Cari siswa...">
  </header>

  <div class="stats">
    <div class="stat-box">
      <h2 id="totalSiswa">0</h2>
      <p>Total</p>
    </div>
    <div class="stat-box">
      <h2 id="lulus">0</h2>
      <p>Lulus</p>
    </div>
    <div class="stat-box">
      <h2 id="tidakLulus">0</h2>
      <p>Tidak</p>
    </div>
  </div>

  <div class="grid" id="list"></div>
</div>

<div class="modal" id="modal">
  <div class="modal-content">
    <span class="close" onclick="closeModal()">X</span>
    <h2 id="detailNama"></h2>
    <p id="detailInfo"></p>
  </div>
</div>

<script>
const data = [
  {nama: "Ahmad", kelas: "XII RPL 1", nilai: 85},
  {nama: "Budi", kelas: "XII RPL 1", nilai: 60},
  {nama: "Citra", kelas: "XII RPL 2", nilai: 90},
  {nama: "Dina", kelas: "XII RPL 2", nilai: 70},
  {nama: "Eko", kelas: "XII RPL 3", nilai: 50},
];

const list = document.getElementById("list");
const search = document.getElementById("search");

function render(dataFilter = data) {
  list.innerHTML = "";

  let lulus = 0;
  let tidak = 0;

  dataFilter.forEach((siswa) => {
    const status = siswa.nilai >= 75 ? "Lulus" : "Tidak";

    if(status === "Lulus") lulus++;
    else tidak++;

    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `
      <span class="badge">${status}</span>
      <h3>${siswa.nama}</h3>
      <p>${siswa.kelas}</p>
      <p>Nilai: ${siswa.nilai}</p>
    `;

    card.onclick = () => showDetail(siswa);
    list.appendChild(card);
  });

  document.getElementById("totalSiswa").innerText = dataFilter.length;
  document.getElementById("lulus").innerText = lulus;
  document.getElementById("tidakLulus").innerText = tidak;
}

function showDetail(siswa) {
  document.getElementById("detailNama").innerText = siswa.nama;
  document.getElementById("detailInfo").innerText = `Kelas: ${siswa.kelas} | Nilai: ${siswa.nilai}`;
  document.getElementById("modal").classList.add("active");
}

function closeModal() {
  document.getElementById("modal").classList.remove("active");
}

search.addEventListener("input", () => {
  const keyword = search.value.toLowerCase();
  const filtered = data.filter(d => d.nama.toLowerCase().includes(keyword));
  render(filtered);
});

render();
</script>

</body>
</html>
